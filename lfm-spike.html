<!doctype html>
<!--
  FoodGuard 可行性探針 (SPIKE) — 非正式產品頁，用來驗證 LFM2.5-VL-450M 是否能
  完全在瀏覽器 (WebGPU/WASM, transformers.js) 執行菜單/營養標籤辨識。
  · 用法：npm run dev → 開 http://localhost:5173/lfm-spike.html （用 Chrome/Edge）
  · 首次載入會從 HuggingFace CDN 下載模型（約 0.5–0.8 GB），之後由瀏覽器快取。
  · 這裡用 CDN 匯入 transformers.js 只是為了快速驗證；正式版會用 npm 打包（自我包含），
    只有模型權重會像 Open Food Facts 一樣從公共 CDN 串流（無金鑰、無自有伺服器）。
-->
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LFM2.5-VL 可行性探針</title>
    <style>
      body { font-family: system-ui, "Microsoft JhengHei", sans-serif; max-width: 720px; margin: 0 auto; padding: 16px; color: #1e293b; background: #f8fafc; }
      h1 { font-size: 18px; }
      .card { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 14px; margin-bottom: 14px; }
      button { font: inherit; padding: 10px 14px; border-radius: 10px; border: none; background: #0f766e; color: #fff; cursor: pointer; }
      button:disabled { background: #94a3b8; cursor: default; }
      textarea, select, input { font: inherit; width: 100%; box-sizing: border-box; padding: 8px; border: 1px solid #cbd5e1; border-radius: 8px; margin-top: 6px; }
      textarea { min-height: 64px; }
      #bar { height: 10px; background: #e2e8f0; border-radius: 999px; overflow: hidden; margin-top: 8px; }
      #barfill { height: 100%; width: 0; background: #0f766e; transition: width .2s; }
      pre { white-space: pre-wrap; word-break: break-word; background: #0f172a; color: #e2e8f0; padding: 12px; border-radius: 8px; font-size: 13px; }
      .muted { color: #64748b; font-size: 13px; }
      img#preview { max-width: 100%; border-radius: 8px; margin-top: 8px; display: none; }
      .ok { color: #16a34a; } .warn { color: #d97706; } .err { color: #dc2626; }
    </style>
  </head>
  <body>
    <h1>🔬 LFM2.5-VL-450M 可行性探針</h1>
    <div class="card">
      <div id="env" class="muted">偵測環境中…</div>
    </div>

    <div class="card">
      <button id="load">① 載入模型</button>
      <div id="bar"><div id="barfill"></div></div>
      <div id="loadmsg" class="muted"></div>
    </div>

    <div class="card">
      <label>② 選一張圖（菜單照片 / 營養標籤 / 任意）
        <input id="file" type="file" accept="image/*" />
      </label>
      <img id="preview" alt="" />
      <label style="display:block;margin-top:10px">任務
        <select id="preset">
          <option value="menu">菜單 → 抽出菜名清單</option>
          <option value="label">營養標籤 → 抽成 JSON</option>
          <option value="caption">一般描述</option>
        </select>
      </label>
      <label style="display:block;margin-top:10px">提示詞 (prompt)
        <textarea id="prompt"></textarea>
      </label>
      <button id="run" disabled style="margin-top:10px">③ 執行辨識</button>
    </div>

    <div class="card">
      <div class="muted">輸出：</div>
      <pre id="out">（尚未執行）</pre>
      <div id="timing" class="muted"></div>
    </div>

    <script type="module">
      import {
        AutoModelForImageTextToText,
        AutoProcessor,
        RawImage,
      } from "https://cdn.jsdelivr.net/npm/@huggingface/transformers@4.2.0";

      const MODEL_ID = "LiquidAI/LFM2.5-VL-450M-ONNX";
      const $ = (id) => document.getElementById(id);
      const PROMPTS = {
        menu: "List every dish name you can read in this menu image. Output a plain list, one dish per line, no prices or descriptions.",
        label:
          "Read this nutrition facts label. Output JSON with keys serving_size, energy_kcal, fat_g, sugar_g, fiber_g, sodium_mg, protein_g. Use null if a value is not shown.",
        caption: "What food is in this image? Answer briefly.",
      };

      const hasGPU = !!navigator.gpu;
      $("env").innerHTML = hasGPU
        ? `<span class="ok">✔ WebGPU 可用</span>（將以 GPU 執行，最快）`
        : `<span class="warn">⚠ 無 WebGPU</span>，將退回 WASM/CPU（可執行但較慢）。建議用最新版 Chrome / Edge。`;

      $("preset").onchange = () => ($("prompt").value = PROMPTS[$("preset").value]);
      $("prompt").value = PROMPTS.menu;

      let imageURL = null;
      $("file").onchange = (e) => {
        const f = e.target.files?.[0];
        if (!f) return;
        imageURL = URL.createObjectURL(f);
        const img = $("preview");
        img.src = imageURL;
        img.style.display = "block";
        $("run").disabled = !model;
      };

      let model = null;
      let processor = null;

      $("load").onclick = async () => {
        $("load").disabled = true;
        const t0 = performance.now();
        try {
          const progress = (p) => {
            if (p.status === "progress" && p.total) {
              const pct = Math.round((p.loaded / p.total) * 100);
              $("barfill").style.width = pct + "%";
              $("loadmsg").textContent = `下載 ${p.file || ""} … ${pct}% (${(p.loaded / 1048576).toFixed(0)}/${(p.total / 1048576).toFixed(0)} MB)`;
            } else if (p.status === "ready") {
              $("loadmsg").textContent = "模型就緒。";
            }
          };
          const dtype = hasGPU
            ? { vision_encoder: "fp16", embed_tokens: "fp16", decoder_model_merged: "q4" }
            : { vision_encoder: "q4", embed_tokens: "q8", decoder_model_merged: "q4" };
          model = await AutoModelForImageTextToText.from_pretrained(MODEL_ID, {
            device: hasGPU ? "webgpu" : "wasm",
            dtype,
            progress_callback: progress,
          });
          processor = await AutoProcessor.from_pretrained(MODEL_ID);
          $("barfill").style.width = "100%";
          $("loadmsg").innerHTML = `<span class="ok">✔ 載入完成（${((performance.now() - t0) / 1000).toFixed(1)}s）</span>`;
          $("run").disabled = !imageURL;
        } catch (err) {
          $("loadmsg").innerHTML = `<span class="err">✗ 載入失敗：${err?.message || err}</span>`;
          $("load").disabled = false;
        }
      };

      $("run").onclick = async () => {
        if (!model || !imageURL) return;
        $("run").disabled = true;
        $("out").textContent = "辨識中…";
        const t0 = performance.now();
        try {
          const image = await RawImage.fromURL(imageURL);
          const messages = [
            { role: "user", content: [{ type: "image" }, { type: "text", text: $("prompt").value }] },
          ];
          const chatPrompt = processor.apply_chat_template(messages, { add_generation_prompt: true });
          const inputs = await processor(image, chatPrompt, { add_special_tokens: false });
          const outputs = await model.generate({ ...inputs, do_sample: false, max_new_tokens: 160 });
          const inputLength = inputs.input_ids.dims.at(-1);
          const generated = outputs.slice(null, [inputLength, null]);
          const text = processor.batch_decode(generated, { skip_special_tokens: true })[0];
          $("out").textContent = text || "（空輸出）";
          $("timing").textContent = `推理耗時 ${((performance.now() - t0) / 1000).toFixed(1)}s`;
        } catch (err) {
          $("out").textContent = "✗ 執行失敗：" + (err?.message || err);
        }
        $("run").disabled = false;
      };
    </script>
  </body>
</html>
